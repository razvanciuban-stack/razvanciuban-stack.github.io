<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cluj</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3601532085875516" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .header {
      text-align: center;
      padding: 24px 16px 16px;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      color: #555;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .event-list { padding: 0 16px; }
    .event {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #151515;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .event:active { opacity: 0.6; }
    .event { touch-action: pan-y; }
    .event-info { flex: 1; min-width: 0; }
    .event-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-meta {
      color: #555;
      font-size: 12px;
      margin-top: 3px;
    }
    .event-countdown {
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      color: #555;
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }
    .section-header {
      color: #555;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 16px 8px;
      border-top: 1px solid #222;
    }
    .event-date {
      color: #555;
      font-size: 12px;
      flex-shrink: 0;
      margin-left: 12px;
      text-align: right;
    }
    .ad-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ad-overlay .ad-timer {
      color: #555;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .ad-overlay .ad-slot {
      width: 100%;
      max-width: 320px;
      min-height: 250px;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .ad-overlay .ad-skip {
      color: #555;
      font-size: 13px;
      cursor: pointer;
      padding: 8px 16px;
    }
    .ad-overlay .ad-skip.active {
      color: #fff;
      border: 1px solid #333;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CLUJ</h1>
    <p>Next 4 hours</p>
  </div>
  <div id="app">
    <div class="state">Loading...</div>
  </div>

  <script>
    const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes
    const WINDOW_HOURS = 4;

    function formatCountdown(ms) {
      const minutes = Math.floor(ms / 60000);
      if (minutes < 5) return 'now';
      if (minutes < 60) return minutes + 'm';
      const hours = Math.floor(minutes / 60);
      const remainingMinutes = minutes % 60;
      if (hours < 2 && remainingMinutes > 0) return hours + 'h ' + remainingMinutes + 'm';
      return hours + 'h';
    }

    function formatTime(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' });
    }

    function formatPrice(price) {
      if (!price) return 'Pret indisponibil';
      if (price === '0') return 'Gratuit';
      return price + ' lei';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function getTomorrowRange() {
      var now = new Date();
      var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      var dayAfter = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2);
      return { start: tomorrow.getTime(), end: dayAfter.getTime() };
    }

    function formatDateShort(dateStr) {
      var d = new Date(dateStr);
      return d.toLocaleDateString('ro-RO', { day: 'numeric', month: 'short' });
    }

    function cleanName(name) {
      return (name || '').replace(/^Cluj-Napoca:\s*/i, '').replace(/^Cluj:\s*/i, '');
    }

    function renderEventRow(e, now, showCountdown) {
      var time = formatTime(e.date);
      var price = formatPrice(e.price);
      var name = cleanName(e.name);
      var right = '';
      if (showCountdown) {
        var countdown = formatCountdown(e._ts - now);
        right = '<div class="event-countdown">' + countdown + '</div>';
      } else {
        right = '<div class="event-date">' + time + '</div>';
      }
      return '<a class="event" href="' + esc(e.url) + '" target="_blank" rel="noopener" onclick="showAd(event, this)">' +
        '<div class="event-info">' +
          '<div class="event-name">' + esc(name) + '</div>' +
          '<div class="event-meta">' + esc(e.venue) + ', Cluj-Napoca · ' + time + ' · ' + price + '</div>' +
        '</div>' +
        right +
      '</a>';
    }

    function renderEvents(events) {
      const app = document.getElementById('app');
      const now = Date.now();
      const windowEnd = now + WINDOW_HOURS * 60 * 60 * 1000;
      const tomorrow = getTomorrowRange();

      const allEvents = events
        .map(function(e) { return Object.assign({}, e, { _ts: new Date(e.date).getTime() }); })
        .filter(function(e) { return !isNaN(e._ts); });

      const soonEvents = allEvents
        .filter(function(e) { return e._ts > now && e._ts <= windowEnd; })
        .sort(function(a, b) { return a._ts - b._ts; });

      const tomorrowEvents = allEvents
        .filter(function(e) { return e._ts >= tomorrow.start && e._ts < tomorrow.end; })
        .sort(function(a, b) { return a._ts - b._ts; });

      var html = '';

      // Next 4 hours section
      if (soonEvents.length > 0) {
        html += '<div class="event-list">' +
          soonEvents.map(function(e) { return renderEventRow(e, now, true); }).join('') +
        '</div>';
      } else {
        html += '<div class="state">No events in the next 4 hours</div>';
      }

      // Tomorrow section
      if (tomorrowEvents.length > 0) {
        html += '<div class="section-header">Tomorrow</div>';
        html += '<div class="event-list">' +
          tomorrowEvents.map(function(e) { return renderEventRow(e, now, false); }).join('') +
        '</div>';
      }

      app.innerHTML = html;
    }

    async function load() {
      try {
        var res = await fetch('data/events.json');
        if (!res.ok) throw new Error('fetch failed');
        var events = await res.json();
        renderEvents(events);
      } catch (e) {
        document.getElementById('app').innerHTML =
          '<div class="state">Could not load events</div>';
      }
    }

    function showAd(evt, el) {
      evt.preventDefault();
      var url = el.getAttribute('href');
      var overlay = document.createElement('div');
      overlay.className = 'ad-overlay';
      var seconds = 5;
      overlay.innerHTML =
        '<div class="ad-timer">Redirecting in <span id="ad-count">' + seconds + '</span>s</div>' +
        '<div class="ad-slot">' +
        '<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3601532085875516" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="false"></ins>' +
        '</div>' +
        '<div class="ad-skip" id="ad-skip">Wait ' + seconds + 's...</div>';
      document.body.appendChild(overlay);

      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}

      var counter = document.getElementById('ad-count');
      var skipBtn = document.getElementById('ad-skip');
      var interval = setInterval(function() {
        seconds--;
        counter.textContent = seconds;
        skipBtn.textContent = seconds > 0 ? 'Wait ' + seconds + 's...' : '';
        if (seconds <= 0) {
          clearInterval(interval);
          skipBtn.textContent = 'Go to tickets →';
          skipBtn.className = 'ad-skip active';
          skipBtn.onclick = function() {
            document.body.removeChild(overlay);
            window.open(url, '_blank');
          };
        }
      }, 1000);
    }

    load();
    setInterval(load, REFRESH_INTERVAL);
  </script>
</body>
</html>
